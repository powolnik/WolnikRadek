<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Zielony Pływak</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0a1628;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Canvas wrapper: scales canvas to fill viewport keeping 16:9 ── */
    #wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #scaler {
      position: relative;
      width: 1280px;
      height: 720px;
      transform-origin: top left;
    }
    canvas#canvas {
      display: block;
      width: 1280px;
      height: 720px;
      image-rendering: pixelated;
    }

    /* ── Spinner / loading overlay ── */
    #loader {
      position: absolute;
      inset: 0;
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #7ec8a0;
      font-size: 15px;
      letter-spacing: .12em;
      z-index: 10;
      pointer-events: none;
    }
    #loader.hidden { display: none; }
    #loader-dot {
      width: 8px; height: 8px;
      background: #7ec8a0;
      border-radius: 50%;
      margin-bottom: 18px;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }

    /* ── Tap-to-start overlay (menu screen) ── */
    #tap-start {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 48px;
      z-index: 8;
      pointer-events: none;
    }
    #tap-start span {
      color: #7ec8a0;
      font-size: 18px;
      letter-spacing: .2em;
      text-transform: uppercase;
      animation: blink 1.4s ease-in-out infinite;
      pointer-events: auto;
      cursor: pointer;
      padding: 12px 24px;
      border: 1px solid #2a5a3a;
      border-radius: 4px;
      background: rgba(10,22,40,.7);
    }
    #tap-start.hidden { display: none; }
    @keyframes blink { 0%,100%{opacity:.25} 50%{opacity:1} }

    /* ── Touch controls overlay ── */
    #touch-ui {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
    }
    #touch-ui.hidden { display: none; }

    .btn {
      position: absolute;
      border-radius: 50%;
      background: rgba(100,200,130,.18);
      border: 2px solid rgba(100,200,130,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(150,230,160,.8);
      font-size: 22px;
      pointer-events: auto;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      transition: background .1s;
    }
    .btn:active, .btn.pressed {
      background: rgba(100,200,130,.42);
      border-color: rgba(100,200,130,.7);
    }
    .btn.rect {
      border-radius: 10px;
    }

    /* Left side — D-pad */
    #btn-left  { width:80px;height:80px; bottom:110px; left:20px; }
    #btn-right { width:80px;height:80px; bottom:110px; left:120px; }

    /* Right side — action buttons */
    #btn-jump     { width:90px;height:90px; bottom:120px; right:110px; }
    #btn-interact { width:70px;height:70px; bottom:220px; right:20px; }
    #btn-pause    { width:54px;height:54px; top:16px;     right:16px; border-radius:10px; font-size:18px; }

    /* Back link */
    #back {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      color: #3a6a5a;
      font-size: 11px;
      text-decoration: none;
      opacity: .5;
      z-index: 20;
      pointer-events: auto;
    }
    #back:hover { opacity: 1; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="scaler">

    <!-- Game canvas -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <!-- Loading overlay -->
    <div id="loader">
      <div id="loader-dot"></div>
      <span>loading Zielony Pływak&hellip;</span>
    </div>

    <!-- Tap to start (shown after load, hidden after ENTER) -->
    <div id="tap-start">
      <span id="tap-label">— tap to begin —</span>
    </div>

    <!-- Touch controls (shown after game starts) -->
    <div id="touch-ui" class="hidden">
      <button class="btn" id="btn-left">&#9664;</button>
      <button class="btn" id="btn-right">&#9654;</button>
      <button class="btn" id="btn-jump">&#9651;</button>
      <button class="btn" id="btn-interact">E</button>
      <button class="btn rect" id="btn-pause">&#9646;&#9646;</button>
    </div>
  </div>
</div>

<a id="back" href="../../">&larr; back to portfolio</a>

<script>
// ─── Viewport scaling ───────────────────────────────────────────────────────
const GAME_W = 1280, GAME_H = 720;
const scaler = document.getElementById('scaler');
function resize() {
  const scaleX = window.innerWidth  / GAME_W;
  const scaleY = window.innerHeight / GAME_H;
  const scale  = Math.min(scaleX, scaleY);
  const offX   = (window.innerWidth  - GAME_W * scale) / 2;
  const offY   = (window.innerHeight - GAME_H * scale) / 2;
  scaler.style.transform = `translate(${offX}px,${offY}px) scale(${scale})`;
}
resize();
window.addEventListener('resize', resize);

// ─── Key dispatch helpers ───────────────────────────────────────────────────
function fireKey(type, key, code, keyCode) {
  const ev = new KeyboardEvent(type, {
    key, code, keyCode, which: keyCode,
    bubbles: true, cancelable: true
  });
  document.dispatchEvent(ev);
  window.dispatchEvent(ev);
  const canvas = document.getElementById('canvas');
  if (canvas) canvas.dispatchEvent(ev);
}
function pressKey(key, code, keyCode) {
  fireKey('keydown', key, code, keyCode);
}
function releaseKey(key, code, keyCode) {
  fireKey('keyup', key, code, keyCode);
}

// ─── State flags ────────────────────────────────────────────────────────────
let gameStarted = false;

// ─── Tap-to-start ───────────────────────────────────────────────────────────
const tapStart  = document.getElementById('tap-start');
const tapLabel  = document.getElementById('tap-label');
const touchUI   = document.getElementById('touch-ui');
const loader    = document.getElementById('loader');

function doStart() {
  if (gameStarted) return;
  gameStarted = true;
  tapStart.classList.add('hidden');
  touchUI.classList.remove('hidden');
  // Fire ENTER to transition MENU → PLAYING
  pressKey('Enter', 'Enter', 13);
  setTimeout(() => releaseKey('Enter', 'Enter', 13), 80);
}

tapLabel.addEventListener('click', doStart);
tapLabel.addEventListener('touchstart', e => { e.preventDefault(); doStart(); }, { passive: false });

// Also allow physical keyboard Enter to start
window.addEventListener('keydown', e => {
  if (!gameStarted && (e.key === 'Enter' || e.key === ' ')) doStart();
});

// ─── Touch button helper ────────────────────────────────────────────────────
function makeTouchBtn(id, key, code, keyCode) {
  const btn = document.getElementById(id);
  function down(e) {
    e.preventDefault();
    btn.classList.add('pressed');
    pressKey(key, code, keyCode);
  }
  function up(e) {
    e.preventDefault();
    btn.classList.remove('pressed');
    releaseKey(key, code, keyCode);
  }
  btn.addEventListener('touchstart',  down, { passive: false });
  btn.addEventListener('touchend',    up,   { passive: false });
  btn.addEventListener('touchcancel', up,   { passive: false });
  btn.addEventListener('mousedown', down);
  btn.addEventListener('mouseup',   up);
  btn.addEventListener('mouseleave',up);
}

makeTouchBtn('btn-left',     'ArrowLeft',  'ArrowLeft',  37);
makeTouchBtn('btn-right',    'ArrowRight', 'ArrowRight', 39);
makeTouchBtn('btn-jump',     ' ',          'Space',      32);
makeTouchBtn('btn-interact', 'e',          'KeyE',       69);
makeTouchBtn('btn-pause',    'Escape',     'Escape',     27);

// ─── Emscripten Module ──────────────────────────────────────────────────────
var Module = {
  canvas: (function() {
    var c = document.getElementById('canvas');
    c.addEventListener('webglcontextlost', e => e.preventDefault(), false);
    return c;
  })(),
  setStatus: function(text) {
    if (!text) {
      loader.classList.add('hidden');
    }
  },
  monitorRunDependencies: function(left) {
    if (left === 0) {
      loader.classList.add('hidden');
    }
  },
  onRuntimeInitialized: function() {
    loader.classList.add('hidden');
  }
};

window.onerror = function(msg) {
  loader.innerHTML = '<span style="color:#e06060">Error: ' + msg + '</span>';
};
</script>
<script async type="text/javascript" src="index.js"></script>
</body>
</html>
