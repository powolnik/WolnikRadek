<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zielony Pływak</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #7ec8a0;
    }
    #game-container { position: relative; }
    canvas#canvas {
      display: block;
      border: 2px solid #2a5a3a;
      image-rendering: pixelated;
    }
    #hint {
      margin-top: 18px;
      font-size: 15px;
      letter-spacing: 0.18em;
      color: #7ec8a0;
      text-align: center;
      animation: blink 1.4s ease-in-out infinite;
      text-transform: uppercase;
    }
    @keyframes blink { 0%,100%{opacity:0.25} 50%{opacity:1} }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #4a8a6a;
      text-align: center;
      min-height: 16px;
    }
    #back {
      margin-top: 16px;
      color: #4a8a6a;
      text-decoration: none;
      font-size: 12px;
      opacity: 0.5;
    }
    #back:hover { opacity: 1; }
    #spinner {
      font-size: 13px;
      color: #7ec8a0;
      margin-bottom: 8px;
      animation: blink 1.2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="spinner">▶ loading Zielony Pływak…</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="hint" style="display:none">—— press enter to begin ——</div>
    <div id="status"></div>
    <a id="back" href="../../">← back to portfolio</a>
  </div>

  <script type="text/javascript">
    var statusEl  = document.getElementById('status');
    var spinnerEl = document.getElementById('spinner');
    var hintEl    = document.getElementById('hint');

    var Module = {
      canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('webglcontextlost', function(e) {
          e.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: function(text) {
        if (text) {
          statusEl.textContent = text;
        } else {
          spinnerEl.style.display = 'none';
          statusEl.textContent = '';
        }
      },
      monitorRunDependencies: function(left) {
        if (left === 0) {
          spinnerEl.style.display = 'none';
          hintEl.style.display = 'block';
        }
      },
      onRuntimeInitialized: function() {
        spinnerEl.style.display = 'none';
        statusEl.textContent = '';
      }
    };

    // Hide hint once player presses Enter (they're in the game)
    window.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.keyCode === 13) {
        hintEl.style.display = 'none';
      }
    });

    window.onerror = function(msg) {
      statusEl.textContent = 'Error: ' + msg;
      statusEl.style.color = '#e06060';
    };
  </script>
  <script async type="text/javascript" src="index.js"></script>
</body>
</html>
