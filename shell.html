<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #08081a;
      --accent:   #6060ff;
      --text:     #c8c8e8;
      --card-bg:  #0e0e20;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Loading screen ───────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .loading-title {
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .progress-bar {
      width: 260px; height: 3px;
      background: #1a1a2e;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s linear;
    }

    .loading-status {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      opacity: 0.5;
    }

    /* ── Canvas wrapper ───────────────────────────────────────────────── */
    #canvas-container {
      position: relative;
      line-height: 0;
    }

    canvas#canvas {
      display: block;
      /* Letterbox to viewport while preserving 16:9 */
      max-width:  min(100vw, calc(100vh * 16 / 9));
      max-height: min(100vh, calc(100vw * 9 / 16));
      width:  1280px;
      height: 720px;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    /* ── Status bar ───────────────────────────────────────────────────── */
    #status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 4px 12px;
      background: rgba(8,8,26,0.85);
      border-top: 1px solid rgba(96,96,255,0.15);
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="loading-title">Initialising</div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="loading-status" id="loading-status">Loading WebAssembly…</div>
  </div>

  <!-- Game canvas -->
  <div id="canvas-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="status-left">C++ / WebAssembly</span>
    <span id="status-right"></span>
  </div>

  <!-- Emscripten glue (injected by compiler) -->
  {{{ SCRIPT }}}

  <script>
    // ── Emscripten module config ─────────────────────────────────────────
    var Module = {
      canvas: (function() { return document.getElementById('canvas'); })(),

      setStatus: function(text) {
        var el = document.getElementById('loading-status');
        if (el) el.textContent = text || 'Ready';

        // Parse "Downloading… X%" style messages for the progress bar
        var m = text.match(/(\d+(\.\d+)?)%/);
        var fill = document.getElementById('progress-fill');
        if (m && fill) {
          fill.style.width = m[1] + '%';
        } else if (!text && fill) {
          fill.style.width = '100%';
          setTimeout(function() {
            var overlay = document.getElementById('loading');
            if (overlay) overlay.classList.add('hidden');
          }, 400);
        }
      },

      onRuntimeInitialized: function() {
        Module.setStatus('');
        document.getElementById('status-right').textContent =
          'WebGL · SDL2 · ' + new Date().getFullYear();
      },

      print:    function(t) { console.log('[game]', t); },
      printErr: function(t) { console.error('[game]', t); },
    };
  </script>

</body>
</html>
